<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset password — Edroso Dental</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-[#f5f0eb] font-sans text-[#2c3e50] flex items-center justify-center px-4 py-10" style="font-family:Inter,sans-serif">
    <div class="w-full max-w-[480px] rounded-2xl bg-white p-8 shadow-lg border border-black/5">
        <header class="text-center mb-6">
            <p class="text-2xl font-bold text-[#22ccb2]">Edroso Dental</p>
            <h1 class="mt-2 text-lg font-semibold">Reset password</h1>
            <p class="mt-2 text-sm text-gray-600">Enter the code from your email and choose a new password (at least 8 characters).</p>
        </header>
        <p id="formError" class="hidden mb-4 rounded-lg bg-red-50 px-3 py-2 text-sm text-red-700 border border-red-100" role="alert"></p>
        <form id="rpForm" class="space-y-4" onsubmit="event.preventDefault();">
            <div>
                <label for="email" class="block text-sm font-medium mb-1">Email</label>
                <input type="email" id="email" required autocomplete="email" class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm focus:border-[#22ccb2] focus:outline-none focus:ring-2 focus:ring-[#22ccb2]/30">
            </div>
            <div>
                <label for="token" class="block text-sm font-medium mb-1">Verification code</label>
                <input type="text" id="token" required inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="6 digits" class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm focus:border-[#22ccb2] focus:outline-none focus:ring-2 focus:ring-[#22ccb2]/30">
            </div>
            <div>
                <label for="new_password" class="block text-sm font-medium mb-1">New password</label>
                <input type="password" id="new_password" required minlength="8" autocomplete="new-password" class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm focus:border-[#22ccb2] focus:outline-none focus:ring-2 focus:ring-[#22ccb2]/30">
            </div>
            <div>
                <label for="confirm_password" class="block text-sm font-medium mb-1">Confirm password</label>
                <input type="password" id="confirm_password" required minlength="8" autocomplete="new-password" class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm focus:border-[#22ccb2] focus:outline-none focus:ring-2 focus:ring-[#22ccb2]/30">
            </div>
            <button type="submit" id="submitBtn" class="w-full rounded-xl bg-[#22ccb2] py-3 text-sm font-semibold text-white shadow-sm hover:bg-[#1bab96] disabled:opacity-60">Reset password</button>
        </form>
        <p class="mt-6 text-center text-sm text-gray-600">
            <a href="../login.html" class="font-semibold text-[#22ccb2] hover:text-[#1bab96]">Back to login</a>
        </p>
    </div>
    <script>
        function apiUrl() {
            var pathname = window.location.pathname || '';
            var idx = pathname.indexOf('/customer-site');
            if (idx !== -1) {
                return window.location.origin + pathname.substring(0, idx) + '/api/patient_auth.php';
            }
            return new URL('../../api/patient_auth.php', window.location.href).href;
        }
        const API = apiUrl();
        let csrfToken = '';
        async function loadCsrf() {
            const res = await fetch(API + '?action=csrf', { credentials: 'same-origin' });
            const data = await res.json().catch(function () { return {}; });
            if (!res.ok || !data.csrf_token) throw new Error('csrf');
            csrfToken = String(data.csrf_token);
        }
        document.getElementById('rpForm').addEventListener('submit', async function () {
            const err = document.getElementById('formError');
            err.classList.add('hidden');
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            try {
                if (!csrfToken) await loadCsrf();
                const body = {
                    action: 'reset_password',
                    email: document.getElementById('email').value.trim(),
                    token: document.getElementById('token').value.trim(),
                    new_password: document.getElementById('new_password').value,
                    confirm_password: document.getElementById('confirm_password').value,
                    csrf_token: csrfToken
                };
                const res = await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
                    credentials: 'same-origin',
                    body: JSON.stringify(body)
                });
                const data = await res.json().catch(function () { return {}; });
                if (res.ok && data.success) {
                    window.location.href = '../login.html';
                    return;
                }
                err.textContent = data.error || 'Reset failed.';
                err.classList.remove('hidden');
            } catch (e) {
                err.textContent = 'Could not reach the server.';
                err.classList.remove('hidden');
            }
            btn.disabled = false;
        });
        loadCsrf().catch(function () {});
    </script>
</body>
</html>
