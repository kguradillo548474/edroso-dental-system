<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Edroso Dental</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    colors: {
                        'fg-brand': '#22ccb2',
                        brand: '#22ccb2',
                        body: '#64748b',
                        default: '#e2e8f0',
                    },
                    borderRadius: { base: '0.25rem' },
                    borderColor: {
                        default: '#e2e8f0',
                        brand: '#22ccb2',
                    },
                },
            },
        };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-[#f5f0eb] font-sans text-[#2c3e50] antialiased hidden" id="portalDashboardBody">
    <header class="sticky top-0 z-20 border-b border-black/5 bg-white/95 backdrop-blur-sm shadow-sm">
        <div class="mx-auto flex max-w-4xl items-center justify-between gap-4 px-4 py-3 sm:px-6">
            <span class="text-lg font-bold tracking-tight text-[#22ccb2]">Edroso Dental</span>
            <div class="flex items-center gap-3 sm:gap-4">
                <span id="navUserName" class="max-w-[8rem] truncate text-sm font-medium text-[#2c3e50] sm:max-w-xs"></span>
                <button type="button" id="logoutBtn" class="rounded-lg border border-[#22ccb2]/40 bg-[#22ccb2] px-3 py-1.5 text-sm font-semibold text-white shadow-sm transition hover:bg-[#1bab96] focus:outline-none focus:ring-2 focus:ring-[#22ccb2] focus:ring-offset-2">
                    Logout
                </button>
            </div>
        </div>
    </header>

    <main class="mx-auto max-w-4xl px-4 py-8 sm:px-6 sm:py-10">
        <div class="border-b border-default">
            <ul class="flex flex-wrap -mb-px text-sm font-medium text-center text-body">
                <li class="me-2">
                    <a href="profile.html" data-tab="profile.html" class="inline-flex items-center justify-center p-4 border-b border-transparent rounded-t-base hover:text-fg-brand hover:border-brand group text-body">
                        <svg class="w-4 h-4 me-2 text-body group-hover:text-fg-brand" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
                        </svg>
                        Profile
                    </a>
                </li>
                <li class="me-2">
                    <a href="dashboard.html" data-tab="dashboard.html" class="inline-flex items-center justify-center p-4 border-b border-transparent rounded-t-base hover:text-fg-brand hover:border-brand group text-body">
                        <svg class="w-4 h-4 me-2 text-body group-hover:text-fg-brand" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 10h16M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01M16 18h.01M6 4v2M18 4v2M5 6h14a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1Z"/>
                        </svg>
                        Dashboard
                    </a>
                </li>
                <li class="me-2">
                    <a href="settings.html" data-tab="settings.html" class="inline-flex items-center justify-center p-4 border-b border-transparent rounded-t-base hover:text-fg-brand hover:border-brand group text-body">
                        <svg class="w-4 h-4 me-2 text-body group-hover:text-fg-brand" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.24-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.075-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 0 1 0-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281Z"/>
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
                        </svg>
                        Settings
                    </a>
                </li>
            </ul>
        </div>
        <script src="assets/js/portal-tabs.js"></script>

        <h1 class="mt-8 text-2xl font-bold text-[#2c3e50] sm:text-3xl">Welcome back, <span id="welcomeName">—</span></h1>

        <section class="mt-10 rounded-2xl border border-black/5 bg-white p-6 shadow-sm sm:p-8">
            <h2 class="text-lg font-semibold text-[#2c3e50]">Book an Appointment</h2>
            <p class="mt-1 text-sm text-gray-600">Choose a date and time that works for you.</p>
            <a href="book.html" data-book-cta class="mt-5 inline-flex w-full items-center justify-center rounded-xl bg-[#22ccb2] px-6 py-3.5 text-sm font-semibold text-white shadow-md transition hover:bg-[#1bab96] focus:outline-none focus:ring-2 focus:ring-[#22ccb2] focus:ring-offset-2 sm:w-auto">
                Book an Appointment
            </a>
        </section>

        <section class="mt-10">
            <h2 class="text-lg font-semibold text-[#2c3e50]">Upcoming Appointments</h2>
            <p id="actionError" class="mt-2 hidden rounded-lg border border-red-100 bg-red-50 px-3 py-2 text-sm text-red-700" role="alert"></p>
            <div id="upcomingList" class="mt-4 space-y-4">
                <p class="text-sm text-gray-500">Loading…</p>
            </div>
        </section>

        <section class="mt-12">
            <h2 class="text-lg font-semibold text-[#2c3e50]">Past Appointments</h2>
            <div id="pastList" class="mt-4 rounded-xl border border-gray-200/80 bg-white/60 p-4 sm:p-5">
                <p class="text-sm text-gray-500">Loading…</p>
            </div>
        </section>
    </main>

    <script>
(function () {
    const AUTH_API = '../../api/patient_auth.php';
    const APPT_API = '../../api/patient_appointments.php';
    let csrfToken = '';

    async function loadCsrfToken() {
        const res = await fetch(AUTH_API + '?action=csrf', { credentials: 'same-origin' });
        const data = await res.json().catch(function () { return {}; });
        if (!res.ok || !data.csrf_token) {
            throw new Error(data.error || 'Could not initialize security token.');
        }
        csrfToken = String(data.csrf_token);
    }

    let portalUserId = null;
    let portalUserName = '';

    function parseYMD(iso) {
        const p = String(iso).split('-');
        const y = +p[0], m = +p[1], d = +p[2];
        return new Date(y, m - 1, d);
    }

    function formatDate(iso) {
        return parseYMD(iso).toLocaleDateString('en-PH', {
            weekday: 'long',
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        });
    }

    function formatTime(t) {
        const s = String(t);
        const m = s.match(/^(\d{1,2}):(\d{2})/);
        if (!m) return s;
        const d = new Date(2000, 0, 1, +m[1], +m[2]);
        return d.toLocaleTimeString('en-PH', { hour: '2-digit', minute: '2-digit' });
    }

    function sortUpcoming(a, b) {
        const da = String(a.preferred_date).localeCompare(String(b.preferred_date));
        if (da !== 0) return da;
        return String(a.preferred_time).localeCompare(String(b.preferred_time));
    }

    function sortPast(a, b) {
        const da = String(b.preferred_date).localeCompare(String(a.preferred_date));
        if (da !== 0) return da;
        return String(b.preferred_time).localeCompare(String(a.preferred_time));
    }

    function escapeHtml(str) {
        if (str == null) return '';
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
    }

    function showActionError(msg) {
        const e = document.getElementById('actionError');
        e.textContent = msg;
        e.classList.remove('hidden');
    }

    function clearActionError() {
        const e = document.getElementById('actionError');
        e.textContent = '';
        e.classList.add('hidden');
    }

    async function fetchAppointments(status) {
        const url = APPT_API + '?user_id=' + encodeURIComponent(portalUserId) + '&status=' + encodeURIComponent(status);
        const res = await fetch(url, { credentials: 'same-origin', cache: 'no-store' });
        const data = await res.json().catch(function () { return {}; });
        if (!res.ok) return [];
        return Array.isArray(data.appointments) ? data.appointments : [];
    }

    function renderUpcoming(items) {
        const el = document.getElementById('upcomingList');
        if (!items.length) {
            el.innerHTML = '<p class="text-sm text-gray-600">No upcoming appointments. <a href="book.html" data-book-cta class="font-semibold text-[#22ccb2] hover:text-[#1bab96]">Book one now!</a></p>';
            return;
        }
        el.innerHTML = items.map(function (a) {
            const id = escapeHtml(String(a.id));
            const dateStr = formatDate(a.preferred_date);
            const timeStr = formatTime(a.preferred_time);
            const visitReason = a.procedure_name || a.reason_label || a.reason || '—';
            const reason = escapeHtml(visitReason);
            const st = (a.status || '').toLowerCase();
            const statusLabel = st === 'scheduled' ? 'Scheduled' : 'Pending';
            const statusClass = st === 'scheduled'
                ? 'bg-emerald-100 text-emerald-800 border-emerald-200'
                : 'bg-amber-100 text-amber-900 border-amber-200';
            const showCancel = st === 'pending' || st === 'scheduled';
            const cancelBtn = showCancel
                ? '<button type="button" class="cancel-appt w-full shrink-0 rounded-lg border border-red-200 bg-white px-3 py-2 text-sm font-medium text-red-700 transition hover:bg-red-50 sm:w-auto" data-id="' + id + '">Cancel</button>'
                : '';
            const dentistNm = escapeHtml(a.dentist_name || '—');
            return (
                '<article class="rounded-2xl border border-gray-200 bg-white p-5 shadow-sm" data-appt-card="' + id + '">' +
                '<div class="flex flex-wrap items-start justify-between gap-3">' +
                '<div>' +
                '<p class="text-base font-semibold text-[#2c3e50]">' + escapeHtml(dateStr) + '</p>' +
                '<p class="mt-1 text-sm text-gray-600">' + escapeHtml(timeStr) + '</p>' +
                '</div>' +
                '<div class="flex flex-wrap gap-2">' +
                '<span class="inline-flex items-center rounded-full border px-2.5 py-0.5 text-xs font-semibold ' + statusClass + '">' + statusLabel + '</span>' +
                '</div></div>' +
                '<p class="mt-2 text-sm text-gray-700"><span class="font-medium text-[#2c3e50]">Dentist:</span> ' + dentistNm + '</p>' +
                '<p class="mt-1 text-sm text-gray-700"><span class="font-medium text-[#2c3e50]">Procedure:</span> ' + reason + '</p>' +
                '<div class="mt-4 flex w-full flex-col gap-3 sm:mt-3 sm:flex-row sm:flex-wrap sm:items-center sm:justify-between sm:gap-4">' +
                '<button type="button" class="inline-flex shrink-0 text-left text-sm font-semibold text-[#22ccb2] hover:text-[#1bab96] appt-details-btn" data-appt-id="' + id + '">View details</button>' +
                cancelBtn +
                '</div>' +
                '<div class="appt-details-panel mt-3 hidden rounded-lg border border-gray-100 bg-[#fafafa] p-3 text-sm text-gray-700" data-appt-details="' + id + '"></div>' +
                '</article>'
            );
        }).join('');

        el.querySelectorAll('.appt-details-btn').forEach(function (btn) {
            btn.addEventListener('click', async function () {
                const apptId = this.getAttribute('data-appt-id');
                const panel = document.querySelector('[data-appt-details="' + apptId + '"]');
                if (!panel) return;
                if (!panel.classList.contains('hidden') && panel.dataset.loaded === '1') {
                    panel.classList.add('hidden');
                    return;
                }
                panel.classList.remove('hidden');
                if (panel.dataset.loaded === '1') return;
                panel.innerHTML = 'Loading…';
                try {
                    const res = await fetch(APPT_API + '?id=' + encodeURIComponent(apptId), { credentials: 'same-origin', cache: 'no-store' });
                    const d = await res.json().catch(function () { return {}; });
                    if (!res.ok) throw new Error(d.error || 'Could not load');
                    const addr = d.clinic_address ? escapeHtml(String(d.clinic_address)) : '—';
                    const spec = d.dentist_specialization ? escapeHtml(String(d.dentist_specialization)) : '—';
                    const notes = d.notes ? escapeHtml(String(d.notes)) : '—';
                    const pay = d.payment_status ? escapeHtml(String(d.payment_status)) : '—';
                    panel.innerHTML =
                        '<p><span class="font-medium text-[#2c3e50]">Specialization:</span> ' + spec + '</p>' +
                        '<p class="mt-1"><span class="font-medium text-[#2c3e50]">Clinic address:</span> ' + addr + '</p>' +
                        '<p class="mt-1"><span class="font-medium text-[#2c3e50]">Notes:</span> ' + notes + '</p>' +
                        '<p class="mt-1"><span class="font-medium text-[#2c3e50]">Payment status:</span> ' + pay + '</p>';
                    panel.dataset.loaded = '1';
                } catch (e) {
                    panel.innerHTML = '<p class="text-red-600">Could not load details.</p>';
                }
            });
        });
        el.querySelectorAll('.cancel-appt').forEach(function (btn) {
            btn.addEventListener('click', async function () {
                clearActionError();
                const apptId = this.getAttribute('data-id');
                if (!apptId) return;
                if (!window.confirm('Are you sure you want to cancel this appointment?')) return;
                try {
                    const res = await fetch(APPT_API + '?action=cancel&id=' + encodeURIComponent(apptId), {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
                        credentials: 'same-origin',
                        body: JSON.stringify({ csrf_token: csrfToken })
                    });
                    const data = await res.json().catch(function () { return {}; });
                    if (res.ok && data.success) {
                        const card = document.querySelector('[data-appt-card="' + apptId + '"]');
                        if (card) card.remove();
                        if (!document.querySelector('[data-appt-card]')) {
                            renderUpcoming([]);
                        }
                        loadPast();
                        return;
                    }
                } catch (e) { /* fallthrough */ }
                showActionError('Could not cancel. Please try again.');
            });
        });
    }

    function renderPast(items) {
        const el = document.getElementById('pastList');
        if (!items.length) {
            el.innerHTML = '<p class="text-sm text-gray-500">No past appointments yet.</p>';
            return;
        }
        el.innerHTML = '<ul class="divide-y divide-gray-200/90">' + items.map(function (a) {
            const st = (a.status || '').toLowerCase();
            const isCancelled = st === 'cancelled';
            const badgeClass = isCancelled
                ? 'bg-gray-100 text-gray-600 border-gray-200'
                : 'bg-[#22ccb2]/10 text-[#1bab96] border-[#22ccb2]/30';
            const statusLabel = isCancelled ? 'Cancelled' : 'Completed';
            return (
                '<li class="flex flex-wrap items-baseline gap-x-3 gap-y-1 py-3 text-sm text-gray-600 first:pt-0 last:pb-0">' +
                '<span class="font-medium text-gray-700">' + escapeHtml(formatDate(a.preferred_date)) + '</span>' +
                '<span class="text-gray-400" aria-hidden="true">|</span>' +
                '<span>' + escapeHtml(formatTime(a.preferred_time)) + '</span>' +
                '<span class="text-gray-400" aria-hidden="true">|</span>' +
                '<span class="min-w-0 flex-1 truncate">' + escapeHtml(a.procedure_name || a.reason_label || a.reason || '—') + '</span>' +
                '<span class="text-gray-400" aria-hidden="true">|</span>' +
                '<span class="inline-flex rounded-full border px-2 py-0.5 text-xs font-medium ' + badgeClass + '">' + statusLabel + '</span>' +
                '</li>'
            );
        }).join('') + '</ul>';
    }

    async function loadUpcoming() {
        const pending = await fetchAppointments('pending');
        const scheduled = await fetchAppointments('scheduled');
        const combined = pending.concat(scheduled).sort(sortUpcoming);
        renderUpcoming(combined);
    }

    async function loadPast() {
        const completed = await fetchAppointments('completed');
        const cancelled = await fetchAppointments('cancelled');
        const combined = completed.concat(cancelled).sort(sortPast);
        renderPast(combined);
    }

    document.getElementById('logoutBtn').addEventListener('click', async function () {
        try {
            await fetch(AUTH_API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
                credentials: 'same-origin',
                body: JSON.stringify({ action: 'logout', csrf_token: csrfToken })
            });
        } catch (_) { /* still redirect */ }
        window.location.href = '../login.html';
    });

    (async function init() {
        try {
            await loadCsrfToken();
            const res = await fetch(AUTH_API + '?action=me', { credentials: 'same-origin' });
            const data = await res.json().catch(function () { return {}; });
            if (!res.ok) {
                window.location.replace('../login.html');
                return;
            }
            portalUserId = data.id;
            portalUserName = data.name || 'Patient';
            document.getElementById('welcomeName').textContent = portalUserName;
            document.getElementById('navUserName').textContent = portalUserName;
            document.getElementById('portalDashboardBody').classList.remove('hidden');
        } catch (e) {
            window.location.replace('../login.html');
            return;
        }
        await loadUpcoming();
        await loadPast();
    })();
})();
    </script>
    <script src="../assets/js/booking-cta.js?v=20260428"></script>
</body>
</html>
