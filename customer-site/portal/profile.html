<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile — Edroso Dental</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    colors: {
                        'fg-brand': '#22ccb2',
                        brand: '#22ccb2',
                        body: '#64748b',
                        default: '#e2e8f0',
                    },
                    borderRadius: { base: '0.25rem' },
                    borderColor: {
                        default: '#e2e8f0',
                        brand: '#22ccb2',
                    },
                },
            },
        };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-[#f5f0eb] font-sans text-[#2c3e50] antialiased hidden" id="portalProfileBody">
    <header class="sticky top-0 z-20 border-b border-black/5 bg-white/95 backdrop-blur-sm shadow-sm">
        <div class="mx-auto flex max-w-4xl items-center justify-between gap-4 px-4 py-3 sm:px-6">
            <span class="text-lg font-bold tracking-tight text-[#22ccb2]">Edroso Dental</span>
            <div class="flex items-center gap-3 sm:gap-4">
                <span id="navUserName" class="max-w-[8rem] truncate text-sm font-medium text-[#2c3e50] sm:max-w-xs"></span>
                <button type="button" id="logoutBtn" class="rounded-lg border border-[#22ccb2]/40 bg-[#22ccb2] px-3 py-1.5 text-sm font-semibold text-white shadow-sm transition hover:bg-[#1bab96] focus:outline-none focus:ring-2 focus:ring-[#22ccb2] focus:ring-offset-2">
                    Logout
                </button>
            </div>
        </div>
    </header>

    <main class="mx-auto max-w-4xl px-4 py-8 sm:px-6 sm:py-10">
        <div class="border-b border-default">
            <ul class="flex flex-wrap -mb-px text-sm font-medium text-center text-body">
                <li class="me-2">
                    <a href="profile.html" data-tab="profile.html" class="inline-flex items-center justify-center p-4 border-b border-transparent rounded-t-base hover:text-fg-brand hover:border-brand group text-body">
                        <svg class="w-4 h-4 me-2 text-body group-hover:text-fg-brand" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
                        </svg>
                        Profile
                    </a>
                </li>
                <li class="me-2">
                    <a href="dashboard.html" data-tab="dashboard.html" class="inline-flex items-center justify-center p-4 border-b border-transparent rounded-t-base hover:text-fg-brand hover:border-brand group text-body">
                        <svg class="w-4 h-4 me-2 text-body group-hover:text-fg-brand" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 10h16M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01M16 18h.01M6 4v2M18 4v2M5 6h14a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1Z"/>
                        </svg>
                        Dashboard
                    </a>
                </li>
                <li class="me-2">
                    <a href="settings.html" data-tab="settings.html" class="inline-flex items-center justify-center p-4 border-b border-transparent rounded-t-base hover:text-fg-brand hover:border-brand group text-body">
                        <svg class="w-4 h-4 me-2 text-body group-hover:text-fg-brand" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.24-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.075-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 0 1 0-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281Z"/>
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
                        </svg>
                        Settings
                    </a>
                </li>
            </ul>
        </div>
        <script src="assets/js/portal-tabs.js"></script>

        <section class="mt-8 rounded-2xl border border-black/5 bg-white p-6 shadow-sm sm:p-8">
            <h1 class="text-xl font-bold text-[#2c3e50] sm:text-2xl">Your profile</h1>
            <p class="mt-1 text-sm text-gray-600">Contact details from your portal account.</p>
            <dl class="mt-6 grid gap-4 text-sm sm:grid-cols-2">
                <div>
                    <dt class="text-xs font-semibold uppercase tracking-wide text-gray-400">Full name</dt>
                    <dd id="pfName" class="mt-1 font-medium text-[#2c3e50]">—</dd>
                </div>
                <div>
                    <dt class="text-xs font-semibold uppercase tracking-wide text-gray-400">Email</dt>
                    <dd id="pfEmail" class="mt-1 font-medium text-[#2c3e50]">—</dd>
                </div>
                <div>
                    <dt class="text-xs font-semibold uppercase tracking-wide text-gray-400">Phone</dt>
                    <dd id="pfPhone" class="mt-1 font-medium text-[#2c3e50]">—</dd>
                </div>
                <div>
                    <dt class="text-xs font-semibold uppercase tracking-wide text-gray-400">Date of birth</dt>
                    <dd id="pfDob" class="mt-1 font-medium text-[#2c3e50]">—</dd>
                </div>
            </dl>
        </section>
    </main>

    <script>
        const AUTH_API = '../../api/patient_auth.php';
        let csrfToken = '';
        async function loadCsrfToken() {
            const res = await fetch(AUTH_API + '?action=csrf', { credentials: 'same-origin' });
            const data = await res.json().catch(function () { return {}; });
            if (!res.ok || !data.csrf_token) throw new Error(data.error || 'csrf');
            csrfToken = String(data.csrf_token);
        }
        document.getElementById('logoutBtn').addEventListener('click', async function () {
            try {
                await fetch(AUTH_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
                    credentials: 'same-origin',
                    body: JSON.stringify({ action: 'logout', csrf_token: csrfToken })
                });
            } catch (_) {}
            window.location.href = '../login.html';
        });
        (async function init() {
            try {
                await loadCsrfToken();
                const res = await fetch(AUTH_API + '?action=me', { credentials: 'same-origin' });
                const data = await res.json().catch(function () { return {}; });
                if (!res.ok) {
                    window.location.replace('../login.html');
                    return;
                }
                document.getElementById('navUserName').textContent = data.name || 'Patient';
                document.getElementById('pfName').textContent = data.name || '—';
                document.getElementById('pfEmail').textContent = data.email || '—';
                document.getElementById('pfPhone').textContent = data.phone || '—';
                document.getElementById('pfDob').textContent = data.dob || '—';
                document.getElementById('portalProfileBody').classList.remove('hidden');
            } catch (e) {
                window.location.replace('../login.html');
            }
        })();
    </script>
</body>
</html>
