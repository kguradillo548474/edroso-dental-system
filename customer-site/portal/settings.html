<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings — Edroso Dental</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    colors: {
                        'fg-brand': '#22ccb2',
                        brand: '#22ccb2',
                        body: '#64748b',
                        default: '#e2e8f0',
                    },
                    borderRadius: { base: '0.25rem' },
                    borderColor: {
                        default: '#e2e8f0',
                        brand: '#22ccb2',
                    },
                },
            },
        };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-[#fbfcfd] font-sans text-[#0f172a] hidden" id="settingsBody" style="font-family:Inter,sans-serif">
    <header class="sticky top-0 z-20 border-b border-slate-200/70 bg-white/95 shadow-sm backdrop-blur-sm">
        <div class="mx-auto grid max-w-5xl grid-cols-1 items-center gap-3 px-4 py-2.5 sm:px-6 lg:grid-cols-[1fr_auto_1fr]">
            <a href="dashboard.html" class="inline-flex items-center gap-2 justify-self-start self-center" aria-label="Edroso Dental Clinic">
                <span class="inline-flex h-9 w-9 items-center justify-center rounded-lg bg-[#22ccb2] shadow-sm">
                    <img src="../../assets/images/tooth-icon.png" alt="" class="h-7 w-7 rounded-md object-cover" loading="lazy" decoding="async">
                </span>
                <span class="text-sm font-bold tracking-tight text-[#22ccb2]">Edroso Dental Clinic</span>
            </a>
            <nav aria-label="Portal navigation" class="justify-self-center self-center">
                <ul class="flex flex-wrap items-center justify-center gap-5 text-center text-sm text-body">
                <li>
                    <a href="profile.html" data-tab="profile.html" class="inline-flex items-center justify-center gap-1.5 px-3 py-2.5 text-sm font-medium border-b-2 border-transparent hover:text-fg-brand hover:border-brand/60 transition-colors group text-body">
                        <svg class="h-3.5 w-3.5 text-body group-hover:text-fg-brand" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
                        </svg>
                        Profile
                    </a>
                </li>
                <li>
                    <a href="dashboard.html" data-tab="dashboard.html" class="inline-flex items-center justify-center gap-1.5 px-3 py-2.5 text-sm font-medium border-b-2 border-transparent hover:text-fg-brand hover:border-brand/60 transition-colors group text-body">
                        <svg class="h-3.5 w-3.5 text-body group-hover:text-fg-brand" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2Z"/>
                        </svg>
                        Appointments
                    </a>
                </li>
                <li>
                    <a href="settings.html" data-tab="settings.html" class="inline-flex items-center justify-center gap-1.5 px-3 py-2.5 text-sm font-medium border-b-2 border-transparent hover:text-fg-brand hover:border-brand/60 transition-colors group text-body">
                        <svg class="h-3.5 w-3.5 text-body group-hover:text-fg-brand" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.24-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.075-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 0 1 0-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281Z"/>
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
                        </svg>
                        Settings
                    </a>
                </li>
                </ul>
            </nav>
            <div class="flex items-center justify-self-start self-center gap-3 lg:justify-self-end">
                <span class="inline-flex h-8 w-8 items-center justify-center rounded-full bg-[#22ccb2] text-xs font-bold text-white" id="navUserInitial">P</span>
                <span id="navUserName" class="max-w-[9rem] truncate text-xs font-semibold text-[#0f172a] sm:max-w-[12rem]"></span>
                <button type="button" id="logoutBtn" class="rounded-lg bg-[#159b8c] px-3 py-1.5 text-xs font-semibold text-white shadow-sm transition hover:bg-[#0f766e] focus:outline-none focus:ring-2 focus:ring-[#22ccb2] focus:ring-offset-2">
                    Logout
                </button>
            </div>
        </div>
        <script src="assets/js/portal-tabs.js"></script>
    </header>

    <main class="mx-auto max-w-5xl px-4 py-8 sm:px-6 sm:py-10">
        <section class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm sm:p-8">
            <h1 class="text-xl font-bold text-[#0f172a]">Change password</h1>
            <p class="mt-1 text-sm text-slate-600">Use at least 8 characters.</p>
            <p id="pwError" class="mt-3 hidden rounded-lg bg-red-50 px-3 py-2 text-sm text-red-700 border border-red-100" role="alert"></p>
            <p id="pwOk" class="mt-3 hidden rounded-lg bg-emerald-50 px-3 py-2 text-sm text-emerald-800 border border-emerald-100" role="status"></p>
            <form id="pwForm" class="mt-5 space-y-4" onsubmit="event.preventDefault();">
                <div>
                    <label for="current_password" class="block text-sm font-medium mb-1">Current password</label>
                    <input type="password" id="current_password" required autocomplete="current-password" class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm focus:border-[#22ccb2] focus:outline-none focus:ring-2 focus:ring-[#22ccb2]/30">
                </div>
                <div>
                    <label for="new_password" class="block text-sm font-medium mb-1">New password</label>
                    <input type="password" id="new_password" required minlength="8" autocomplete="new-password" class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm focus:border-[#22ccb2] focus:outline-none focus:ring-2 focus:ring-[#22ccb2]/30">
                </div>
                <div>
                    <label for="confirm_password" class="block text-sm font-medium mb-1">Confirm new password</label>
                    <input type="password" id="confirm_password" required minlength="8" autocomplete="new-password" class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm focus:border-[#22ccb2] focus:outline-none focus:ring-2 focus:ring-[#22ccb2]/30">
                </div>
                <button type="submit" id="pwBtn" class="w-full rounded-xl bg-[#22ccb2] py-3 text-sm font-semibold text-white shadow-sm hover:bg-[#1bab96] disabled:opacity-60">Update password</button>
            </form>
        </section>

        <section class="mt-8 rounded-2xl border border-slate-200 bg-white p-6 shadow-sm sm:p-8">
            <h2 class="text-xl font-bold text-[#0f172a]">Security question (forgot password)</h2>
            <p id="recoveryCurrent" class="mt-2 text-sm text-gray-600"></p>
            <p id="recError" class="mt-3 hidden rounded-lg bg-red-50 px-3 py-2 text-sm text-red-700 border border-red-100" role="alert"></p>
            <p id="recOk" class="mt-3 hidden rounded-lg bg-emerald-50 px-3 py-2 text-sm text-emerald-800 border border-emerald-100" role="status"></p>
            <form id="recForm" class="mt-5 space-y-4" onsubmit="event.preventDefault();">
                <div>
                    <label for="rec_current_password" class="block text-sm font-medium mb-1">Current password</label>
                    <input type="password" id="rec_current_password" required autocomplete="current-password" class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm focus:border-[#22ccb2] focus:outline-none focus:ring-2 focus:ring-[#22ccb2]/30">
                </div>
                <div>
                    <label for="rec_question_preset" class="block text-sm font-medium mb-1">Question</label>
                    <select id="rec_question_preset" class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm focus:border-[#22ccb2] focus:outline-none focus:ring-2 focus:ring-[#22ccb2]/30">
                        <option value="What was your favorite food as a child?">What was your favorite food as a child?</option>
                        <option value="What city were you born in?">What city were you born in?</option>
                        <option value="What was the name of your first pet?">What was the name of your first pet?</option>
                        <option value="What is your mother’s maiden name?">What is your mother’s maiden name?</option>
                        <option value="__custom__">Write my own question…</option>
                    </select>
                </div>
                <div id="rec_custom_wrap" class="hidden">
                    <label for="rec_question_custom" class="block text-sm font-medium mb-1">Your question</label>
                    <input type="text" id="rec_question_custom" maxlength="255" autocomplete="off" class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm focus:border-[#22ccb2] focus:outline-none focus:ring-2 focus:ring-[#22ccb2]/30">
                </div>
                <div>
                    <label for="rec_answer" class="block text-sm font-medium mb-1">Answer</label>
                    <input type="text" id="rec_answer" required autocomplete="off" class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm focus:border-[#22ccb2] focus:outline-none focus:ring-2 focus:ring-[#22ccb2]/30" placeholder="New answer you will remember">
                </div>
                <button type="submit" id="recBtn" class="w-full rounded-xl bg-[#22ccb2] py-3 text-sm font-semibold text-white shadow-sm hover:bg-[#1bab96] disabled:opacity-60">Save security question</button>
            </form>
        </section>
    </main>
    <script>
        const AUTH_API = '../../api/patient_auth.php';
        let csrfToken = '';
        async function loadCsrf() {
            const res = await fetch(AUTH_API + '?action=csrf', { credentials: 'same-origin' });
            const data = await res.json().catch(function () { return {}; });
            if (!res.ok || !data.csrf_token) throw new Error('csrf');
            csrfToken = String(data.csrf_token);
        }
        document.getElementById('logoutBtn').addEventListener('click', async function () {
            try {
                await fetch(AUTH_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
                    credentials: 'same-origin',
                    body: JSON.stringify({ action: 'logout', csrf_token: csrfToken })
                });
            } catch (_) {}
            window.location.href = '../login.html';
        });
        (async function init() {
            try {
                await loadCsrf();
                const me = await fetch(AUTH_API + '?action=me', { credentials: 'same-origin' });
                const meData = await me.json().catch(function () { return {}; });
                if (!me.ok) {
                    window.location.replace('../login.html');
                    return;
                }
                const displayName = meData.name || 'Patient';
                document.getElementById('navUserName').textContent = displayName;
                const navInitial = document.getElementById('navUserInitial');
                if (navInitial) {
                    navInitial.textContent = String(displayName).trim().charAt(0).toUpperCase() || 'P';
                }
                var cur = document.getElementById('recoveryCurrent');
                if (meData.has_recovery_question && meData.recovery_question) {
                    cur.textContent = 'Current question: “' + meData.recovery_question + '”. You can replace it below.';
                } else {
                    cur.textContent = 'No security question yet. Add one to reset your password without email.';
                }
                if (meData.recovery_question) {
                    var preset = document.getElementById('rec_question_preset');
                    var found = false;
                    for (var i = 0; i < preset.options.length; i++) {
                        if (preset.options[i].value === meData.recovery_question) {
                            preset.selectedIndex = i;
                            found = true;
                            break;
                        }
                    }
                    if (!found && meData.recovery_question) {
                        preset.value = '__custom__';
                        document.getElementById('rec_question_custom').value = meData.recovery_question;
                        document.getElementById('rec_custom_wrap').classList.remove('hidden');
                    }
                }
                document.getElementById('settingsBody').classList.remove('hidden');
            } catch (e) {
                window.location.replace('../login.html');
            }
        })();
        document.getElementById('pwForm').addEventListener('submit', async function () {
            const err = document.getElementById('pwError');
            const ok = document.getElementById('pwOk');
            err.classList.add('hidden');
            ok.classList.add('hidden');
            const btn = document.getElementById('pwBtn');
            btn.disabled = true;
            try {
                if (!csrfToken) await loadCsrf();
                const body = {
                    action: 'change_password',
                    current_password: document.getElementById('current_password').value,
                    new_password: document.getElementById('new_password').value,
                    confirm_password: document.getElementById('confirm_password').value,
                    csrf_token: csrfToken
                };
                const res = await fetch(AUTH_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
                    credentials: 'same-origin',
                    body: JSON.stringify(body)
                });
                const data = await res.json().catch(function () { return {}; });
                if (res.ok && data.success) {
                    ok.textContent = 'Password updated.';
                    ok.classList.remove('hidden');
                    document.getElementById('pwForm').reset();
                } else {
                    err.textContent = data.error || 'Could not update password.';
                    err.classList.remove('hidden');
                }
            } catch (e) {
                err.textContent = 'Network error.';
                err.classList.remove('hidden');
            }
            btn.disabled = false;
        });

        (function () {
            var preset = document.getElementById('rec_question_preset');
            var wrap = document.getElementById('rec_custom_wrap');
            preset.addEventListener('change', function () {
                if (preset.value === '__custom__') {
                    wrap.classList.remove('hidden');
                } else {
                    wrap.classList.add('hidden');
                }
            });
        })();

        function recQuestionValue() {
            var preset = document.getElementById('rec_question_preset').value;
            if (preset === '__custom__') {
                return document.getElementById('rec_question_custom').value.trim();
            }
            return preset;
        }

        document.getElementById('recForm').addEventListener('submit', async function () {
            var err = document.getElementById('recError');
            var ok = document.getElementById('recOk');
            err.classList.add('hidden');
            ok.classList.add('hidden');
            var btn = document.getElementById('recBtn');
            btn.disabled = true;
            try {
                if (!csrfToken) await loadCsrf();
                var q = recQuestionValue();
                if (q.length < 3) {
                    err.textContent = 'Question must be at least 3 characters.';
                    err.classList.remove('hidden');
                    btn.disabled = false;
                    return;
                }
                var body = {
                    action: 'update_recovery',
                    current_password: document.getElementById('rec_current_password').value,
                    recovery_question: q,
                    recovery_answer: document.getElementById('rec_answer').value,
                    csrf_token: csrfToken
                };
                var res = await fetch(AUTH_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
                    credentials: 'same-origin',
                    body: JSON.stringify(body)
                });
                var data = await res.json().catch(function () { return {}; });
                if (res.ok && data.success) {
                    ok.textContent = 'Security question saved.';
                    ok.classList.remove('hidden');
                    document.getElementById('recForm').reset();
                    document.getElementById('recoveryCurrent').textContent = 'Current question: “' + q + '”. You can replace it below.';
                } else {
                    err.textContent = data.error || 'Could not save.';
                    err.classList.remove('hidden');
                }
            } catch (e) {
                err.textContent = 'Network error.';
                err.classList.remove('hidden');
            }
            btn.disabled = false;
        });
    </script>
</body>
</html>
