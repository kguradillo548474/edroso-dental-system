<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot password — Edroso Dental</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-[#f5f0eb] font-sans text-[#2c3e50] flex items-center justify-center px-4 py-10" style="font-family:Inter,sans-serif">
    <div class="w-full max-w-[480px] rounded-2xl bg-white p-8 shadow-lg border border-black/5">
        <header class="text-center mb-6">
            <p class="text-2xl font-bold text-[#22ccb2]">Edroso Dental</p>
            <h1 class="mt-2 text-lg font-semibold">Forgot password</h1>
            <p class="mt-2 text-sm text-gray-600">Use your security question (if you set one), or request a 6-digit email code.</p>
        </header>
        <p id="formMsg" class="hidden mb-4 rounded-lg px-3 py-2 text-sm" role="status"></p>
        <p id="formError" class="hidden mb-4 rounded-lg bg-red-50 px-3 py-2 text-sm text-red-700 border border-red-100" role="alert"></p>

        <div id="stepEmail" class="space-y-4">
            <div>
                <label for="email" class="block text-sm font-medium mb-1">Account email</label>
                <input type="email" id="email" required autocomplete="email" class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm focus:border-[#22ccb2] focus:outline-none focus:ring-2 focus:ring-[#22ccb2]/30">
            </div>
            <button type="button" id="btnRecovery" class="w-full rounded-xl bg-[#22ccb2] py-3 text-sm font-semibold text-white shadow-sm hover:bg-[#1bab96] disabled:opacity-60">Continue with security question</button>
            <button type="button" id="btnEmailCode" class="w-full rounded-xl border border-[#22ccb2]/40 bg-white py-3 text-sm font-semibold text-[#22ccb2] hover:bg-[#22ccb2]/5 disabled:opacity-60">Email me a code instead</button>
        </div>

        <div id="stepAnswer" class="hidden space-y-4 mt-2">
            <p class="text-sm font-medium text-[#2c3e50]">Your question</p>
            <p id="questionText" class="text-sm text-gray-700 rounded-lg bg-gray-50 border border-gray-100 px-3 py-2"></p>
            <div>
                <label for="recovery_answer" class="block text-sm font-medium mb-1">Your answer</label>
                <input type="text" id="recovery_answer" autocomplete="off" class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm focus:border-[#22ccb2] focus:outline-none focus:ring-2 focus:ring-[#22ccb2]/30" placeholder="Same spelling you used when you set it">
            </div>
            <div>
                <label for="new_password" class="block text-sm font-medium mb-1">New password</label>
                <input type="password" id="new_password" minlength="8" autocomplete="new-password" class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm focus:border-[#22ccb2] focus:outline-none focus:ring-2 focus:ring-[#22ccb2]/30">
            </div>
            <div>
                <label for="confirm_password" class="block text-sm font-medium mb-1">Confirm new password</label>
                <input type="password" id="confirm_password" minlength="8" autocomplete="new-password" class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm focus:border-[#22ccb2] focus:outline-none focus:ring-2 focus:ring-[#22ccb2]/30">
            </div>
            <button type="button" id="btnSubmitAnswer" class="w-full rounded-xl bg-[#22ccb2] py-3 text-sm font-semibold text-white shadow-sm hover:bg-[#1bab96] disabled:opacity-60">Update password</button>
            <button type="button" id="btnBack" class="w-full text-sm font-medium text-gray-600 hover:text-[#22ccb2]">← Change email</button>
        </div>

        <p class="mt-6 text-center text-sm text-gray-600">
            <a href="login.html" class="font-semibold text-[#22ccb2] hover:text-[#1bab96]">Back to login</a>
            ·
            <a href="portal/reset-password.html" class="font-semibold text-[#22ccb2] hover:text-[#1bab96]">Have an email code?</a>
        </p>
    </div>
    <script>
        function apiUrl() {
            var pathname = window.location.pathname || '';
            var idx = pathname.indexOf('/customer-site');
            if (idx !== -1) {
                return window.location.origin + pathname.substring(0, idx) + '/api/patient_auth.php';
            }
            return new URL('../api/patient_auth.php', window.location.href).href;
        }
        const API = apiUrl();
        let csrfToken = '';
        async function loadCsrf() {
            const res = await fetch(API + '?action=csrf', { credentials: 'same-origin' });
            const data = await res.json().catch(function () { return {}; });
            if (!res.ok || !data.csrf_token) throw new Error('csrf');
            csrfToken = String(data.csrf_token);
        }
        function hideAlerts() {
            document.getElementById('formMsg').classList.add('hidden');
            document.getElementById('formError').classList.add('hidden');
        }
        function showErr(msg) {
            hideAlerts();
            var el = document.getElementById('formError');
            el.textContent = msg;
            el.classList.remove('hidden');
        }
        function showOk(msg) {
            hideAlerts();
            var el = document.getElementById('formMsg');
            el.textContent = msg;
            el.className = 'mb-4 rounded-lg px-3 py-2 text-sm bg-emerald-50 text-emerald-900 border border-emerald-100';
            el.classList.remove('hidden');
        }

        document.getElementById('btnRecovery').addEventListener('click', async function () {
            hideAlerts();
            var btn = this;
            btn.disabled = true;
            try {
                if (!csrfToken) await loadCsrf();
                var email = document.getElementById('email').value.trim();
                if (!email) {
                    showErr('Please enter your email.');
                    btn.disabled = false;
                    return;
                }
                var res = await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
                    credentials: 'same-origin',
                    body: JSON.stringify({ action: 'recovery_challenge', email: email, csrf_token: csrfToken })
                });
                var data = await res.json().catch(function () { return {}; });
                if (res.ok && data.success && data.question) {
                    document.getElementById('questionText').textContent = data.question;
                    document.getElementById('stepEmail').classList.add('hidden');
                    document.getElementById('stepAnswer').classList.remove('hidden');
                } else {
                    showErr(data.message || 'Could not load your security question.');
                }
            } catch (e) {
                showErr('Could not reach the server.');
            }
            btn.disabled = false;
        });

        document.getElementById('btnEmailCode').addEventListener('click', async function () {
            hideAlerts();
            var btn = this;
            btn.disabled = true;
            try {
                if (!csrfToken) await loadCsrf();
                var email = document.getElementById('email').value.trim();
                var res = await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
                    credentials: 'same-origin',
                    body: JSON.stringify({ action: 'forgot_password', email: email, csrf_token: csrfToken })
                });
                var data = await res.json().catch(function () { return {}; });
                if (data.message) {
                    showOk(data.message);
                } else {
                    showErr(data.error || 'Something went wrong.');
                }
            } catch (e) {
                showErr('Could not reach the server.');
            }
            btn.disabled = false;
        });

        document.getElementById('btnSubmitAnswer').addEventListener('click', async function () {
            hideAlerts();
            var btn = this;
            btn.disabled = true;
            try {
                if (!csrfToken) await loadCsrf();
                var email = document.getElementById('email').value.trim();
                var body = {
                    action: 'reset_password',
                    email: email,
                    recovery_answer: document.getElementById('recovery_answer').value,
                    new_password: document.getElementById('new_password').value,
                    confirm_password: document.getElementById('confirm_password').value,
                    csrf_token: csrfToken
                };
                var res = await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
                    credentials: 'same-origin',
                    body: JSON.stringify(body)
                });
                var data = await res.json().catch(function () { return {}; });
                if (res.ok && data.success) {
                    window.location.href = 'login.html';
                    return;
                }
                showErr(data.error || 'Reset failed.');
            } catch (e) {
                showErr('Could not reach the server.');
            }
            btn.disabled = false;
        });

        document.getElementById('btnBack').addEventListener('click', function () {
            hideAlerts();
            document.getElementById('stepAnswer').classList.add('hidden');
            document.getElementById('stepEmail').classList.remove('hidden');
        });

        loadCsrf().catch(function () {});
    </script>
</body>
</html>
