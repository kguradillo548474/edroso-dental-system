<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot password — Edroso Dental</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-[#f5f0eb] font-sans text-[#2c3e50] flex items-center justify-center px-4 py-10" style="font-family:Inter,sans-serif">
    <div class="w-full max-w-[480px] rounded-2xl bg-white p-8 shadow-lg border border-black/5">
        <header class="text-center mb-6">
            <p class="text-2xl font-bold text-[#22ccb2]">Edroso Dental</p>
            <h1 class="mt-2 text-lg font-semibold">Forgot password</h1>
            <p class="mt-2 text-sm text-gray-600">Enter your account email. If it is registered, we will send a 6-digit code (check spam).</p>
        </header>
        <p id="formMsg" class="hidden mb-4 rounded-lg px-3 py-2 text-sm" role="status"></p>
        <p id="formError" class="hidden mb-4 rounded-lg bg-red-50 px-3 py-2 text-sm text-red-700 border border-red-100" role="alert"></p>
        <form id="fpForm" class="space-y-4" onsubmit="event.preventDefault();">
            <div>
                <label for="email" class="block text-sm font-medium mb-1">Email</label>
                <input type="email" id="email" required autocomplete="email" class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm focus:border-[#22ccb2] focus:outline-none focus:ring-2 focus:ring-[#22ccb2]/30">
            </div>
            <button type="submit" id="submitBtn" class="w-full rounded-xl bg-[#22ccb2] py-3 text-sm font-semibold text-white shadow-sm hover:bg-[#1bab96] disabled:opacity-60">Send code</button>
        </form>
        <p class="mt-6 text-center text-sm text-gray-600">
            <a href="login.html" class="font-semibold text-[#22ccb2] hover:text-[#1bab96]">Back to login</a>
            ·
            <a href="portal/reset-password.html" class="font-semibold text-[#22ccb2] hover:text-[#1bab96]">Have a code?</a>
        </p>
    </div>
    <script>
        function apiUrl() {
            var pathname = window.location.pathname || '';
            var idx = pathname.indexOf('/customer-site');
            if (idx !== -1) {
                return window.location.origin + pathname.substring(0, idx) + '/api/patient_auth.php';
            }
            return new URL('../api/patient_auth.php', window.location.href).href;
        }
        const API = apiUrl();
        let csrfToken = '';
        async function loadCsrf() {
            const res = await fetch(API + '?action=csrf', { credentials: 'same-origin' });
            const data = await res.json().catch(function () { return {}; });
            if (!res.ok || !data.csrf_token) throw new Error('csrf');
            csrfToken = String(data.csrf_token);
        }
        document.getElementById('fpForm').addEventListener('submit', async function () {
            const msg = document.getElementById('formMsg');
            const err = document.getElementById('formError');
            msg.classList.add('hidden');
            err.classList.add('hidden');
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            try {
                if (!csrfToken) await loadCsrf();
                const email = document.getElementById('email').value.trim();
                const res = await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
                    credentials: 'same-origin',
                    body: JSON.stringify({ action: 'forgot_password', email: email, csrf_token: csrfToken })
                });
                const data = await res.json().catch(function () { return {}; });
                if (data.message) {
                    msg.textContent = data.message;
                    msg.className = 'mb-4 rounded-lg px-3 py-2 text-sm bg-emerald-50 text-emerald-900 border border-emerald-100';
                    msg.classList.remove('hidden');
                } else {
                    err.textContent = data.error || 'Something went wrong.';
                    err.classList.remove('hidden');
                }
            } catch (e) {
                err.textContent = 'Could not reach the server.';
                err.classList.remove('hidden');
            }
            btn.disabled = false;
        });
        loadCsrf().catch(function () {});
    </script>
</body>
</html>
