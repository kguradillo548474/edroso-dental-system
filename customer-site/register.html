<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Create account — Edroso Dental</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } } };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-[#f5f0eb] font-sans text-[#2c3e50] antialiased">
    <main class="relative isolate mx-auto flex min-h-screen w-full max-w-7xl items-center justify-center px-4 py-10 sm:px-6 lg:px-8">
        <div class="absolute inset-0 -z-10 bg-[radial-gradient(circle_at_top,_rgba(34,204,178,0.12),_transparent_55%)]"></div>
        <section class="w-full max-w-md rounded-2xl border border-black/5 bg-white p-6 shadow-xl shadow-black/5 sm:p-8">
        <header class="text-center mb-6">
            <p class="text-3xl font-bold text-[#22ccb2] tracking-tight">Edroso Dental</p>
            <h1 class="mt-2 text-xl font-semibold text-[#2c3e50]">Create your account</h1>
        </header>

        <p id="formError" class="hidden mb-4 rounded-lg bg-red-50 px-3 py-2 text-sm text-red-700 border border-red-100" role="alert"></p>

        <form id="registerForm" class="space-y-5" novalidate onsubmit="event.preventDefault();">
            <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
                <div>
                    <label for="first_name" class="mb-1.5 block text-sm font-medium text-[#2c3e50]">First Name</label>
                    <input type="text" id="first_name" name="first_name" required autocomplete="given-name"
                        class="block w-full rounded-lg border border-gray-300 bg-gray-50 px-3 py-2.5 text-sm text-[#2c3e50] placeholder-gray-400 transition focus:border-[#22ccb2] focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#22ccb2]/25">
                </div>
                <div>
                    <label for="last_name" class="mb-1.5 block text-sm font-medium text-[#2c3e50]">Last Name</label>
                    <input type="text" id="last_name" name="last_name" required autocomplete="family-name"
                        class="block w-full rounded-lg border border-gray-300 bg-gray-50 px-3 py-2.5 text-sm text-[#2c3e50] placeholder-gray-400 transition focus:border-[#22ccb2] focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#22ccb2]/25">
                </div>
            </div>
            <div>
                <label for="email" class="mb-1.5 block text-sm font-medium text-[#2c3e50]">Email</label>
                <input type="email" id="email" name="email" required autocomplete="email"
                    class="block w-full rounded-lg border border-gray-300 bg-gray-50 px-3 py-2.5 text-sm text-[#2c3e50] placeholder-gray-400 transition focus:border-[#22ccb2] focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#22ccb2]/25">
            </div>
            <div>
                <label for="phone" class="mb-1.5 block text-sm font-medium text-[#2c3e50]">Mobile Number</label>
                <input type="text" id="phone" name="phone" required inputmode="tel" autocomplete="tel" placeholder="09123456789 or +639123456789"
                    class="block w-full rounded-lg border border-gray-300 bg-gray-50 px-3 py-2.5 text-sm text-[#2c3e50] placeholder-gray-400 transition focus:border-[#22ccb2] focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#22ccb2]/25">
            </div>
            <div>
                <label for="dob" class="mb-1.5 block text-sm font-medium text-[#2c3e50]">Date of Birth</label>
                <input type="date" id="dob" name="dob" required
                    class="block w-full rounded-lg border border-gray-300 bg-gray-50 px-3 py-2.5 text-sm text-[#2c3e50] transition focus:border-[#22ccb2] focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#22ccb2]/25">
            </div>
            <div>
                <label for="password" class="mb-1.5 block text-sm font-medium text-[#2c3e50]">Password</label>
                <div class="relative">
                    <input type="password" id="password" name="password" required minlength="8" autocomplete="new-password"
                        class="block w-full rounded-lg border border-gray-300 bg-gray-50 px-3 py-2.5 pr-12 text-sm text-[#2c3e50] transition focus:border-[#22ccb2] focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#22ccb2]/25">
                    <button type="button" id="togglePw" class="absolute right-2 top-1/2 -translate-y-1/2 px-1 text-xs font-semibold text-[#22ccb2] transition hover:text-[#1bab96]" aria-label="Show password">Show</button>
                </div>
                <p class="mt-1 text-xs text-gray-500">At least 8 characters</p>
            </div>
            <div>
                <label for="confirm_password" class="mb-1.5 block text-sm font-medium text-[#2c3e50]">Confirm Password</label>
                <div class="relative">
                    <input type="password" id="confirm_password" name="confirm_password" required autocomplete="new-password"
                        class="block w-full rounded-lg border border-gray-300 bg-gray-50 px-3 py-2.5 pr-12 text-sm text-[#2c3e50] transition focus:border-[#22ccb2] focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#22ccb2]/25">
                    <button type="button" id="togglePw2" class="absolute right-2 top-1/2 -translate-y-1/2 px-1 text-xs font-semibold text-[#22ccb2] transition hover:text-[#1bab96]" aria-label="Show password">Show</button>
                </div>
            </div>

            <button type="submit" id="submitBtn"
                class="mt-1 w-full rounded-lg bg-[#22ccb2] px-5 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-[#1bab96] focus:outline-none focus:ring-4 focus:ring-[#22ccb2]/30 disabled:cursor-not-allowed disabled:opacity-60">
                Create account
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-gray-600">
            Already have an account?
            <a href="login.html" class="font-semibold text-[#22ccb2] underline-offset-2 transition hover:text-[#1bab96] hover:underline">Log in</a>
        </p>
        </section>
    </main>

    <script src="assets/js/main.js?v=20260503"></script>
    <script>
        function apiPatientAuthUrl() {
            var pathname = window.location.pathname || '';
            var mark = '/customer-site';
            var idx = pathname.indexOf(mark);
            if (idx !== -1) {
                return window.location.origin + pathname.substring(0, idx) + '/api/patient_auth.php';
            }
            return new URL('../api/patient_auth.php', window.location.href).href;
        }
        const API = apiPatientAuthUrl();
        const PHONE_RE = /^\+639\d{9}$/;
        let csrfToken = '';

        async function loadCsrfToken() {
            const res = await fetch(API + '?action=csrf', { credentials: 'same-origin' });
            const data = await res.json().catch(function () { return {}; });
            if (!res.ok || !data.csrf_token) {
                throw new Error(data.error || 'Could not initialize security token.');
            }
            csrfToken = String(data.csrf_token);
        }

        function showError(msg) {
            const el = document.getElementById('formError');
            el.textContent = msg;
            el.classList.remove('hidden');
        }
        function clearError() {
            const el = document.getElementById('formError');
            el.textContent = '';
            el.classList.add('hidden');
        }

        function todayISO() {
            const d = new Date();
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        }

        function yesterdayISO() {
            const d = new Date();
            d.setDate(d.getDate() - 1);
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        }

        function normalizePHPhone(raw) {
            if (!raw) return '';
            let digits = String(raw).replace(/\D/g, '');
            if (digits.startsWith('09')) {
                digits = '63' + digits.slice(1);
            }
            if (digits.length === 10 && digits.startsWith('9')) {
                digits = '63' + digits;
            }
            if (digits.startsWith('63')) {
                return '+' + digits;
            }
            return raw;
        }

        function validateRegisterForm() {
            const errors = [];
            const first_name = document.getElementById('first_name').value.trim();
            const last_name = document.getElementById('last_name').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = normalizePHPhone(document.getElementById('phone').value);
            const dob = document.getElementById('dob').value;
            const password = document.getElementById('password').value;
            const confirm_password = document.getElementById('confirm_password').value;

            if (!first_name) errors.push('First name is required.');
            if (!last_name) errors.push('Last name is required.');
            if (!email) {
                errors.push('Email is required.');
            } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                errors.push('Please enter a valid email address.');
            }
            if (!dob) errors.push('Date of birth is required.');
            if (!phone || !PHONE_RE.test(phone)) {
                errors.push('Please enter a valid Philippine mobile number (e.g. 09123456789 or +639123456789).');
            }
            if (!password) errors.push('Password is required.');
            if (!confirm_password) errors.push('Please confirm your password.');
            if (password && confirm_password && password !== confirm_password) {
                errors.push('Passwords do not match.');
            }
            if (password && password.length < 8) {
                errors.push('Password must be at least 8 characters.');
            }
            return { errors, phone, first_name, last_name, email, dob, password };
        }

        document.getElementById('dob').max = yesterdayISO();
        loadCsrfToken().catch(function (err) { showError(err.message); });

        attachPhoneFormat(document.getElementById('phone'));

        function wireToggle(btnId, inputId) {
            const btn = document.getElementById(btnId);
            const input = document.getElementById(inputId);
            btn.addEventListener('click', function () {
                const show = input.type === 'password';
                input.type = show ? 'text' : 'password';
                btn.textContent = show ? 'Hide' : 'Show';
                btn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
            });
        }
        wireToggle('togglePw', 'password');
        wireToggle('togglePw2', 'confirm_password');

        var registerInFlight = false;
        async function runRegister() {
            if (registerInFlight) {
                return;
            }
            clearError();

            const validation = validateRegisterForm();
            if (validation.errors.length) {
                showError(validation.errors.join(' '));
                return;
            }

            const btn = document.getElementById('submitBtn');
            registerInFlight = true;
            btn.disabled = true;
            const payload = {
                action: 'register',
                first_name: validation.first_name,
                last_name: validation.last_name,
                email: validation.email,
                phone: validation.phone,
                dob: validation.dob,
                password: validation.password
            };
            try {
                const res = await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json; charset=UTF-8', 'X-CSRF-Token': csrfToken },
                    credentials: 'same-origin',
                    body: JSON.stringify(Object.assign({}, payload, { csrf_token: csrfToken }))
                });
                const raw = await res.text();
                var data;
                try {
                    data = JSON.parse(raw);
                } catch (parseErr) {
                    showError('Server did not return JSON. Check that the API URL is correct and PHP is running.');
                    return;
                }
                if (data && data.success === true) {
                    try {
                        sessionStorage.setItem('portal_registration_ok', '1');
                    } catch (e2) { /* ignore */ }
                    window.location.href = 'login.html';
                    return;
                }
                showError((data && data.error) ? String(data.error) : 'Registration failed (HTTP ' + res.status + ').');
            } catch (err) {
                showError('Could not reach the server. Confirm the site URL and that Apache is running.');
            } finally {
                registerInFlight = false;
                btn.disabled = false;
            }
        }

        document.getElementById('registerForm').addEventListener('submit', function (e) {
            e.preventDefault();
            e.stopPropagation();
            runRegister();
        });
    </script>
</body>
</html>
