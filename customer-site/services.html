<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Explore Edroso Dental Clinic services including general dentistry, orthodontics, cosmetic treatments, pediatric care, emergency visits, and whitening.">
    <meta property="og:title" content="Our Services | Edroso Dental Clinic">
    <meta property="og:description" content="Browse complete dental services at Edroso Dental Clinic with tailored treatments for children, adults, and urgent dental needs.">
    <link rel="icon" href="../assets/images/tooth-icon.png">
    <title>Our Services — Edroso Dental Clinic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="font-sans antialiased min-h-screen flex flex-col bg-white text-gray-900">
    <div id="nav"></div>
    <main class="flex-1 w-full">
        <section class="border-b border-gray-100 bg-gradient-to-b from-[var(--surface)] to-white px-4 py-10 sm:py-12 lg:py-14">
            <div class="mx-auto max-w-6xl text-center">
                <h1 class="text-3xl font-bold tracking-tight text-[var(--secondary)] sm:text-4xl">
                    Our Services
                </h1>
                <p class="mx-auto mt-3 max-w-2xl text-sm text-gray-600 sm:text-base">
                    Comprehensive dental care for every stage of life delivered with skill and a gentle touch.
                </p>
            </div>
        </section>

        <section class="px-4 py-12 sm:py-14 lg:py-16">
            <div class="mx-auto max-w-6xl">
                <p id="servicesCatalogHint" class="mb-6 text-center text-sm text-gray-500">Loading current services and prices…</p>
                <div id="servicesCatalogGrid" class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3 lg:gap-8"></div>
            </div>
        </section>
        <script>
        (function () {
            function esc(s) {
                return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
            }
            function escAttr(s) {
                return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/"/g, '&quot;');
            }
            function imgSrc(s) {
                var u = String(s.image_url || '').trim();
                if (!u || !/^(\/|https?:\/\/|assets\/)/i.test(u) || /^javascript:/i.test(u)) return '';
                var base = /^https?:\/\//i.test(u) ? u : encodeURI(u);
                if (s.image_version != null && String(s.image_version) !== '') {
                    base += (base.indexOf('?') === -1 ? '?' : '&') + 'v=' + encodeURIComponent(String(s.image_version));
                }
                return base;
            }
            function cardTop(s) {
                var rawName = s.name || 'Service';
                var src = imgSrc(s);
                if (src) {
                    return '<div class="relative -mx-6 -mt-6 h-36 shrink-0 overflow-hidden bg-gray-100 sm:h-40">' +
                        '<img src="' + escAttr(src) + '" alt="' + escAttr(rawName) + '" class="h-full w-full object-cover" loading="lazy" decoding="async" />' +
                        '<div class="pointer-events-none absolute inset-0 bg-gradient-to-t from-black/20 to-transparent" aria-hidden="true"></div></div>';
                }
                return '<div class="flex h-28 items-center justify-center rounded-xl bg-gradient-to-br from-gray-50 to-gray-100 text-[var(--primary)] sm:h-32" aria-hidden="true">' +
                    '<svg class="h-11 w-11 opacity-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg></div>';
            }
            var chevron = '<svg class="ml-1 h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>';
            var grid = document.getElementById('servicesCatalogGrid');
            var hint = document.getElementById('servicesCatalogHint');
            fetch('../api/services.php?scope=catalog', { credentials: 'same-origin' })
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    var list = (data && data.services) ? data.services : [];
                    if (data && data.error) throw new Error(data.error);
                    hint.classList.add('hidden');
                    if (!list.length) {
                        grid.innerHTML = '<p class="col-span-full text-center text-gray-500 py-10">No services are listed right now. Please call the clinic.</p>';
                        return;
                    }
                    grid.innerHTML = list.map(function (s) {
                        var id = parseInt(s.id, 10) || 0;
                        var price = s.price != null ? '\u20B1' + parseFloat(s.price).toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '';
                        var blurb = (s.description && String(s.description).trim()) ? esc(String(s.description).trim()) : 'Book this service through our online portal or ask our front desk for availability.';
                        return '<article class="flex h-full min-h-0 flex-col overflow-hidden rounded-2xl border border-gray-100 bg-white shadow-md sm:shadow-sm">' +
                            cardTop(s) +
                            '<div class="flex flex-1 flex-col px-6 pb-6 pt-5">' +
                            '<h2 class="text-lg font-semibold text-[var(--secondary)]">' + esc(s.name) + '</h2>' +
                            '<p class="mt-2 text-sm font-medium text-[var(--primary)]">' + price + '</p>' +
                            '<p class="mt-3 flex-1 text-sm leading-relaxed text-gray-600">' + blurb + '</p>' +
                            '<a href="service.html?id=' + id + '" class="mt-4 inline-flex items-center text-sm font-semibold text-[var(--primary)] hover:text-[var(--primary-dark)]">Learn more' + chevron + '</a>' +
                            '</div></article>';
                    }).join('');
                })
                .catch(function () {
                    hint.textContent = 'Could not load services. Please try again later.';
                });
        })();
        </script>
    </main>
    <div id="footer"></div>
    <script src="assets/js/main.js?v=20260503"></script>
    <script src="assets/js/booking-cta.js?v=20260428"></script>
</body>
</html>
