<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payments - Edroso Dental Clinic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <script>tailwind.config={theme:{extend:{colors:{primary:'#22ccb2','primary-dark':'#1bab96',secondary:'#2c3e50',accent:'#f39c12',neutral:'#f5f7fa','neutral-dark':'#e3e8ef'},fontFamily:{inter:['Inter','sans-serif']}}}}}</script>
</head>
<body class="font-sans bg-neutral min-h-screen flex page-payments" style="font-family:'Inter',sans-serif">
    <div id="sidebarMount"></div>
    <div class="ml-64 w-[calc(100%-16rem)]" id="main-content">
        <div id="headerMount"></div>
        <main class="pt-20 px-6 pb-8">

            <!-- Action bar (same rhythm as Patients / Appointments — no extra hero; title is in the fixed header) -->
            <div class="flex flex-wrap justify-between items-center mb-5 gap-3">
                <div class="flex flex-wrap items-center gap-3">
                    <button type="button" id="exportPaymentsBtn" class="px-4 py-2.5 rounded-xl text-sm font-medium transition-colors shadow-sm inline-flex items-center gap-2 border border-neutral-dark bg-white text-secondary hover:bg-neutral">
                        <i class="fas fa-file-csv"></i> Export CSV
                    </button>
                    <button type="button" id="addPaymentBtn" class="px-4 py-2.5 rounded-xl text-sm font-medium transition-colors shadow-sm inline-flex items-center gap-2 payments-btn-primary">
                        <i class="fas fa-plus"></i> Add Payment
                    </button>
                    <select id="statusFilter" class="pl-4 pr-8 py-2.5 rounded-xl border border-neutral-dark bg-white text-sm text-secondary appearance-none cursor-pointer focus:outline-none focus:ring-2 focus:ring-primary/40">
                        <option value="">All status</option>
                        <option value="Pending">Pending</option>
                        <option value="Paid">Paid</option>
                        <option value="Partial">Partial</option>
                        <option value="Refunded">Refunded</option>
                    </select>
                    <div class="flex items-center gap-2">
                        <input type="date" id="dateFrom" title="From date" aria-label="From date"
                            class="py-2.5 px-3 rounded-xl border border-neutral-dark bg-white text-sm text-secondary focus:outline-none focus:ring-2 focus:ring-primary/40">
                        <span class="text-gray-400 text-sm">–</span>
                        <input type="date" id="dateTo" title="To date" aria-label="To date"
                            class="py-2.5 px-3 rounded-xl border border-neutral-dark bg-white text-sm text-secondary focus:outline-none focus:ring-2 focus:ring-primary/40">
                        <button type="button" id="clearDatesBtn" class="px-3 py-2.5 rounded-xl border border-neutral-dark bg-white text-sm text-gray-500 hover:bg-neutral hover:text-secondary transition-colors" title="Clear date range">Clear</button>
                    </div>
                </div>
                <div class="relative w-full sm:w-72 max-w-full">
                    <input type="text" id="searchInput" placeholder="Search payments…" class="pl-10 pr-4 py-2.5 rounded-xl bg-white border border-neutral-dark text-sm text-secondary placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-primary/40 w-full">
                    <i class="fas fa-search text-gray-400 absolute left-3.5 top-1/2 -translate-y-1/2 text-xs"></i>
                </div>
            </div>

            <!-- Stat strip (Patients-style: rounded-2xl, p-4, gap-4; icons + accent bars like Dashboard cards) -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-5">
                <div class="bg-white rounded-2xl p-4 shadow-sm stat-card border border-neutral-dark/40">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <p class="text-xs text-gray-500 uppercase tracking-wide mb-0.5">Total Collected</p>
                            <p class="text-xl sm:text-2xl font-bold payments-stat-collected" id="statPaid">₱0</p>
                        </div>
                        <div class="w-10 h-10 rounded-xl bg-primary/15 flex items-center justify-center shrink-0">
                            <i class="fas fa-money-bill-wave payments-icon-primary"></i>
                        </div>
                    </div>
                    <p class="text-xs text-gray-400">Paid + partial</p>
                    <div class="mt-2 h-1 bg-neutral-dark rounded-full"><div class="h-full bg-primary rounded-full" style="width:72%"></div></div>
                </div>
                <div class="bg-white rounded-2xl p-4 shadow-sm stat-card border border-neutral-dark/40">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <p class="text-xs text-gray-500 uppercase tracking-wide mb-0.5">Total Pending</p>
                            <p class="text-xl sm:text-2xl font-bold payments-stat-pending" id="statPending">₱0</p>
                        </div>
                        <div class="w-10 h-10 rounded-xl bg-accent/15 flex items-center justify-center shrink-0">
                            <i class="fas fa-hourglass-half payments-icon-accent"></i>
                        </div>
                    </div>
                    <p class="text-xs text-gray-400"><span id="pendingCount">0</span> outstanding</p>
                    <div class="mt-2 h-1 bg-neutral-dark rounded-full"><div class="h-full bg-accent rounded-full" style="width:35%"></div></div>
                </div>
                <div class="bg-white rounded-2xl p-4 shadow-sm stat-card border border-neutral-dark/40">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <p class="text-xs text-gray-500 uppercase tracking-wide mb-0.5">Total Records</p>
                            <p class="text-xl sm:text-2xl font-bold payments-stat-total" id="statTotal">0</p>
                        </div>
                        <div class="w-10 h-10 rounded-xl bg-blue-500/15 flex items-center justify-center shrink-0">
                            <i class="fas fa-file-invoice payments-icon-blue"></i>
                        </div>
                    </div>
                    <p class="text-xs text-gray-400">All entries</p>
                    <div class="mt-2 h-1 bg-neutral-dark rounded-full"><div class="h-full bg-blue-500 rounded-full" style="width:50%"></div></div>
                </div>
            </div>

            <!-- Payments table board (matches list tables on other admin pages) -->
            <div class="bg-white rounded-2xl shadow-sm border border-neutral-dark/40 overflow-hidden">
                <div class="px-5 py-3 border-b border-neutral-dark bg-neutral/30 flex items-center gap-3">
                    <span class="w-1 h-6 bg-primary rounded-full shrink-0" aria-hidden="true"></span>
                    <h3 class="font-semibold text-secondary">Payment records</h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="min-w-full">
                        <thead>
                            <tr class="text-left text-xs font-semibold text-gray-500 uppercase tracking-wider border-b border-neutral-dark bg-neutral/40">
                                <th class="px-4 py-3">Patient</th>
                                <th class="px-4 py-3">Description</th>
                                <th class="px-4 py-3">Amount</th>
                                <th class="px-4 py-3">Method</th>
                                <th class="px-4 py-3">Date</th>
                                <th class="px-4 py-3">Status</th>
                                <th class="px-4 py-3 text-right">Receipt</th>
                                <th class="px-4 py-3 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="paymentTable" class="divide-y divide-neutral-dark">
                            <tr><td colspan="8" class="px-4 py-8 text-center text-gray-400">Loading payments...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Payment Modal (matches appointments modals + scrollable body) -->
    <div id="paymentModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 hidden modal-overlay p-4">
        <div class="bg-white rounded-2xl p-6 shadow-2xl w-full max-w-lg mx-auto modal-box max-h-[90vh] overflow-y-auto border border-neutral-dark/60">
            <div class="flex justify-between items-center mb-5">
                <h3 class="font-bold text-secondary text-xl" id="paymentModalTitle">Add Payment</h3>
                <button type="button" onclick="closeModal('paymentModal')" class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-neutral-dark text-gray-400 hover:text-secondary transition-colors" aria-label="Close"><i class="fas fa-times"></i></button>
            </div>
            <form id="paymentForm">
                <input type="hidden" id="paymentId">
                <div class="space-y-4 mb-5">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Patient <span class="text-red-400">*</span></label>
                        <select id="fPatient" required class="w-full px-4 py-2.5 border border-neutral-dark rounded-xl text-sm text-secondary bg-white focus:outline-none focus:ring-2 focus:ring-primary/40 appearance-none">
                            <option value="">Select patient</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Description <span class="text-red-400">*</span></label>
                        <input type="text" id="fDesc" required placeholder="e.g. Teeth Cleaning" class="w-full px-4 py-2.5 border border-neutral-dark rounded-xl text-sm text-secondary placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-primary/40">
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Amount (₱) <span class="text-red-400">*</span></label>
                            <input type="number" id="fAmount" required min="0" step="0.01" class="w-full px-4 py-2.5 border border-neutral-dark rounded-xl text-sm text-secondary focus:outline-none focus:ring-2 focus:ring-primary/40">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Payment method <span class="text-red-400">*</span></label>
                            <select id="fMethod" required class="w-full px-4 py-2.5 border border-neutral-dark rounded-xl text-sm text-secondary bg-white focus:outline-none focus:ring-2 focus:ring-primary/40 appearance-none">
                                <option value="">Select method</option>
                                <option value="Cash">Cash</option>
                                <option value="Card">Card</option>
                                <option value="GCash">GCash</option>
                                <option value="Insurance">Insurance</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Status</label>
                        <select id="fStatus" class="w-full px-4 py-2.5 border border-neutral-dark rounded-xl text-sm text-secondary bg-white focus:outline-none focus:ring-2 focus:ring-primary/40 appearance-none">
                            <option value="Pending">Pending</option>
                            <option value="Paid">Paid</option>
                            <option value="Partial">Partial</option>
                            <option value="Refunded">Refunded</option>
                        </select>
                    </div>
                </div>
                <div class="flex flex-wrap justify-end gap-3 pt-4 border-t border-neutral-dark">
                    <button type="button" onclick="closeModal('paymentModal')" class="px-5 py-2.5 bg-neutral-dark text-secondary rounded-xl text-sm font-medium hover:bg-gray-200 transition-colors">Cancel</button>
                    <button type="submit" id="savePaymentBtn" class="px-5 py-2.5 rounded-xl text-sm font-semibold transition-colors shadow-sm">
                        <i class="fas fa-save mr-1.5"></i>Save Payment
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="../assets/js/layout.js"></script>
    <script src="../assets/js/app.js"></script>
    <script>
    document.getElementById('sidebarMount').innerHTML = getSidebarHTML('payments');
    document.getElementById('headerMount').innerHTML = getHeaderHTML('Payments');

    let patients = [];
    let editingId = null;
    let clinicHeader = {};
    let receiptFormat = 'simple';
    let lastPayments = [];

    function escHtml(s) {
        if (s == null) return '';
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
    }

    const PAYMENT_METHOD_OPTIONS = ['Cash', 'Card', 'GCash', 'Insurance'];
    function normalizePaymentMethodForSelect(m) {
        const map = { 'Credit Card': 'Card', 'Bank Transfer': 'Insurance', 'PhilHealth': 'Insurance', 'HMO': 'Insurance' };
        const v = map[m] || m;
        return PAYMENT_METHOD_OPTIONS.includes(v) ? v : 'Cash';
    }

    function printPaymentReceiptById(id) {
        const p = lastPayments.find(x => String(x.id) === String(id));
        if (!p) { showToast('Payment not found in list.', 'error'); return; }
        printPaymentReceipt(p);
    }

    function printPaymentReceipt(p) {
        const h = clinicHeader || {};
        const detailed = receiptFormat === 'detailed';
        const payDate = (p.display_date || p.payment_date) ? escHtml(formatDate(p.display_date || p.payment_date)) : '—';
        const statusRaw = String(p.status || '').trim();
        const statusLower = statusRaw.toLowerCase();
        const statusClass = statusLower === 'paid' ? 'badge badge--paid' : (statusLower === 'pending' ? 'badge badge--pending' : 'badge');
        const extraMeta = detailed
            ? `<p class="patient-meta">Patient # ${escHtml(p.patient_number || '—')} · Record ${escHtml(p.id)}</p>`
            : '';
        const w = window.open('', '_blank', 'width=440,height=720');
        if (!w) { showToast('Allow pop-ups to print receipt.', 'warning'); return; }
        w.document.write(`<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Receipt — ${escHtml(p.patient_name || 'Payment')}</title>
            <style>
                @page{margin:12mm}*{box-sizing:border-box}
                body{font-family:"Segoe UI",system-ui,sans-serif;margin:0;padding:20px;background:#eef2f6;color:#2c3e50;-webkit-print-color-adjust:exact;print-color-adjust:exact}
                .sheet{max-width:380px;margin:0 auto;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 12px 40px rgba(44,62,80,.12);border:1px solid #e3e8ef}
                .brand{background:linear-gradient(135deg,#22ccb2,#1bab96);color:#fff;text-align:center;padding:22px 20px 18px}
                .brand__icon{width:48px;height:48px;margin:0 auto 10px;border-radius:12px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:1.5rem}
                .brand h1{margin:0;font-size:1.05rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
                .brand p{margin:4px 0 0;font-size:.78rem;opacity:.92;line-height:1.45}
                .rc-body{padding:18px 20px 20px}
                .receipt-tag{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
                .receipt-tag__label{font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#22ccb2}
                .receipt-tag__id{font-size:.72rem;color:#8896a8}
                .patient-box{background:#f5f7fa;border:1px solid #e8edf2;border-radius:10px;padding:12px 14px;margin-bottom:14px}
                .patient-box__label{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#8896a8;margin:0 0 4px}
                .patient-box__name{margin:0;font-size:1rem;font-weight:700;color:#2c3e50}
                .patient-meta{margin:6px 0 0;font-size:.72rem;color:#6b7c93}
                .details{border:1px solid #e8edf2;border-radius:10px;overflow:hidden}
                .details__row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 14px;font-size:.86rem;border-bottom:1px solid #eef2f6}
                .details__row:last-child{border-bottom:0}
                .details__row:nth-child(even){background:#fafbfc}
                .details__k{color:#6b7c93;font-weight:500}
                .details__v{font-weight:600;text-align:right;color:#2c3e50}
                .badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:.72rem;font-weight:700;text-transform:capitalize}
                .badge--paid{background:#d1fae5;color:#047857}
                .badge--pending{background:#fef3c7;color:#b45309}
                .total{margin-top:16px;padding:16px 14px;background:linear-gradient(135deg,#f0fdf9,#e6faf6);border:1px solid #b8ebe3;border-radius:12px;text-align:center}
                .total__label{margin:0;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#1bab96}
                .total__amt{margin:6px 0 0;font-size:1.75rem;font-weight:800;color:#2c3e50}
                .footer{margin-top:16px;padding-top:14px;border-top:1px dashed #d5dde8;text-align:center;font-size:.75rem;color:#8896a8;line-height:1.5}
                @media print{body{background:#fff;padding:0}.sheet{box-shadow:none;border:none;max-width:100%}}
            </style></head><body>
            <article class="sheet">
                <header class="brand">
                    <div class="brand__icon" aria-hidden="true">🦷</div>
                    <h1>${escHtml(h.clinic_name || 'Dental Clinic')}</h1>
                    ${h.dentist_name ? `<p>${escHtml(h.dentist_name)}</p>` : ''}
                    ${h.prc_license ? `<p>PRC ${escHtml(h.prc_license)}</p>` : ''}
                    ${h.clinic_contact ? `<p>${escHtml(h.clinic_contact)}</p>` : ''}
                    ${h.clinic_hours ? `<p>${escHtml(h.clinic_hours)}</p>` : ''}
                </header>
                <div class="rc-body">
                    <div class="receipt-tag">
                        <span class="receipt-tag__label">Official receipt</span>
                        <span class="receipt-tag__id">#${escHtml(p.id)}</span>
                    </div>
                    <div class="patient-box">
                        <p class="patient-box__label">Patient</p>
                        <p class="patient-box__name">${escHtml(p.patient_name)}</p>
                        ${extraMeta}
                    </div>
                    <div class="details">
                        <div class="details__row"><span class="details__k">Description</span><span class="details__v">${escHtml(p.description || '—')}</span></div>
                        <div class="details__row"><span class="details__k">Payment method</span><span class="details__v">${escHtml(p.payment_method)}</span></div>
                        <div class="details__row"><span class="details__k">Status</span><span class="details__v"><span class="${statusClass}">${escHtml(statusRaw || '—')}</span></span></div>
                        <div class="details__row"><span class="details__k">Date</span><span class="details__v">${payDate}</span></div>
                    </div>
                    <div class="total">
                        <p class="total__label">Amount paid</p>
                        <p class="total__amt">${escHtml(formatMoney(p.amount))}</p>
                    </div>
                    <p class="footer">Thank you for choosing ${escHtml(h.clinic_name || 'our clinic')}.<br>Please keep this receipt for your records.</p>
                </div>
            </article>
            <script>window.onload=function(){window.print();}<\/script>
            </body></html>`);
        w.document.close();
    }

    async function init() {
        const user = await checkAuth();
        if (user && user.role !== 'admin') {
            const exportBtn = document.getElementById('exportPaymentsBtn');
            if (exportBtn) {
                exportBtn.classList.add('hidden');
            }
        }
        // Load patients for select
        try {
            patients = await api.get('patients.php');
            const sel = document.getElementById('fPatient');
            patients.forEach(p => sel.appendChild(new Option(`${p.first_name} ${p.last_name}`, p.id)));
        } catch (e) {}
        loadPayments();
    }

    function getPaymentFilterParams() {
        const status = document.getElementById('statusFilter').value;
        const search = document.getElementById('searchInput').value.trim();
        const from = document.getElementById('dateFrom')?.value || '';
        const to = document.getElementById('dateTo')?.value || '';
        const params = {};
        if (status) params.status = status;
        if (search) params.search = search;
        if (from) params.from = from;
        if (to) params.to = to;
        return { params, from, to };
    }

    async function loadPayments() {
        const { params, from, to } = getPaymentFilterParams();
        if (from && to && from > to) {
            showToast('“From” date must be on or before “To” date.', 'error');
            return;
        }
        try {
            const data = await api.get('payments.php', params);
            const payments = data.payments || [];
            const stats = data.stats || {};
            lastPayments = payments;
            clinicHeader = data.clinic_header || {};
            receiptFormat = data.receipt_format === 'detailed' ? 'detailed' : 'simple';

            // Stats
            document.getElementById('statPaid').textContent = formatMoney(stats.total_paid);
            document.getElementById('statPending').textContent = formatMoney(stats.total_pending);
            document.getElementById('pendingCount').textContent = stats.pending_count || 0;
            document.getElementById('statTotal').textContent = stats.total_count || 0;

            // Table
            if (payments.length === 0) {
                document.getElementById('paymentTable').innerHTML = `<tr><td colspan="8" class="px-4 py-10 text-center text-gray-400">No payments found.</td></tr>`;
                return;
            }
            document.getElementById('paymentTable').innerHTML = payments.map(p => {
                const paymentId = parseInt(p.id, 10) || 0;
                const patientName = escHtml(p.patient_name || '');
                const patientNumber = escHtml(p.patient_number || '');
                const description = escHtml(p.description || '—');
                const paymentMethod = escHtml(p.payment_method || '');
                const paymentStatus = escHtml(p.status || '');
                return `
                <tr class="hover:bg-neutral/50 transition-colors">
                    <td class="px-4 py-3">
                        <div class="flex items-center gap-2">
                            <div class="w-8 h-8 rounded-full bg-primary/20 text-primary flex items-center justify-center text-xs font-bold">${escHtml(getInitials(p.patient_name || ''))}</div>
                            <div>
                                <p class="text-sm font-medium text-secondary">${patientName}</p>
                                <p class="text-xs text-gray-400">${patientNumber}</p>
                            </div>
                        </div>
                    </td>
                    <td class="px-4 py-3 text-sm text-secondary">${description}</td>
                    <td class="px-4 py-3 text-sm font-semibold text-secondary">${formatMoney(p.amount)}</td>
                    <td class="px-4 py-3 text-sm text-secondary">
                        <span class="inline-flex px-2 py-1 rounded-lg text-xs font-medium bg-primary/10 text-primary border border-primary/20">${paymentMethod}</span>
                    </td>
                    <td class="px-4 py-3 text-sm text-secondary">${(p.display_date || p.payment_date) ? formatDate(p.display_date || p.payment_date) : '—'}</td>
                    <td class="px-4 py-3">
                        <span class="px-2 py-1 text-xs rounded-full font-medium ${getStatusClass(p.status)}">${paymentStatus}</span>
                    </td>
                    <td class="px-4 py-3 text-right">
                        <button type="button" onclick="printPaymentReceiptById(${paymentId})" class="p-1.5 bg-primary/10 text-primary rounded-lg hover:bg-primary/25 transition-colors text-xs" title="Print receipt"><i class="fas fa-receipt"></i></button>
                    </td>
                    <td class="px-4 py-3 text-right">
                        <div class="flex justify-end gap-1">
                            ${p.status === 'Pending' ? `<button onclick="markPaid(${paymentId})" class="px-2 py-1 bg-green-50 text-green-600 rounded-lg text-xs hover:bg-green-100 font-medium">Mark Paid</button>` : ''}
                            <button onclick="editPayment(${paymentId})" class="p-1.5 bg-accent/10 text-accent rounded-lg hover:bg-accent/20"><i class="fas fa-edit text-xs"></i></button>
                            <button onclick="deletePayment(${paymentId})" class="p-1.5 bg-red-50 text-red-400 rounded-lg hover:bg-red-100"><i class="fas fa-trash text-xs"></i></button>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        } catch (e) {
            showToast('Failed to load payments: ' + e.message, 'error');
        }
    }

    async function markPaid(id) {
        try {
            await api.put(`payments.php?id=${id}`, { status: 'Paid' });
            showToast('Payment marked as paid!');
            loadPayments();
        } catch (e) { showToast('Error: ' + e.message, 'error'); }
    }

    async function editPayment(id) {
        editingId = id;
        document.getElementById('paymentModalTitle').textContent = 'Edit Payment';
        document.getElementById('paymentId').value = id;
        try {
            const row = await api.get('payments.php', { id });
            document.getElementById('fPatient').value = String(row.patient_id || '');
            document.getElementById('fDesc').value = row.description || '';
            document.getElementById('fAmount').value = row.amount != null ? String(row.amount) : '';
            document.getElementById('fMethod').value = normalizePaymentMethodForSelect(row.payment_method || 'Cash');
            document.getElementById('fStatus').value = row.status || 'Pending';
        } catch (e) {
            showToast('Could not load payment: ' + e.message, 'error');
        }
        openModal('paymentModal');
    }

    async function deletePayment(id) {
        if (!confirm('Delete this payment record?')) return;
        try {
            await api.delete(`payments.php?id=${id}`);
            showToast('Payment deleted.');
            loadPayments();
        } catch (e) { showToast('Error: ' + e.message, 'error'); }
    }

    // Add
    document.getElementById('addPaymentBtn').addEventListener('click', () => {
        document.getElementById('paymentModalTitle').textContent = 'Add Payment';
        document.getElementById('paymentForm').reset();
        document.getElementById('paymentId').value = '';
        document.getElementById('fMethod').value = 'Cash';
        editingId = null;
        openModal('paymentModal');
    });

    // Form submit
    document.getElementById('paymentForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const id = document.getElementById('paymentId').value;
        const mid = document.getElementById('fMethod').value;
        if (!mid) {
            showToast('Please select a payment method.', 'error');
            return;
        }
        const body = {
            patient_id: document.getElementById('fPatient').value,
            description: document.getElementById('fDesc').value,
            amount: document.getElementById('fAmount').value,
            payment_method: mid,
            status: document.getElementById('fStatus').value,
            appointment_id: null
        };
        const btn = document.getElementById('savePaymentBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1.5 text-white"></i><span class="text-white">Saving…</span>';
        try {
            if (id) {
                await api.put(`payments.php?id=${id}`, body);
                showToast('Payment updated!');
            } else {
                await api.post('payments.php', body);
                showToast('Payment added!');
            }
            closeModal('paymentModal');
            loadPayments();
        } catch (e) { showToast('Error: ' + e.message, 'error'); }
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save mr-1.5"></i>Save Payment';
    });

    // Filters
    document.getElementById('statusFilter').addEventListener('change', loadPayments);
    document.getElementById('searchInput').addEventListener('input', debounce(loadPayments, 400));
    document.getElementById('dateFrom')?.addEventListener('change', loadPayments);
    document.getElementById('dateTo')?.addEventListener('change', loadPayments);
    document.getElementById('clearDatesBtn')?.addEventListener('click', () => {
        const fromEl = document.getElementById('dateFrom');
        const toEl = document.getElementById('dateTo');
        if (fromEl) fromEl.value = '';
        if (toEl) toEl.value = '';
        loadPayments();
    });
    document.getElementById('exportPaymentsBtn').addEventListener('click', () => {
        const { params, from, to } = getPaymentFilterParams();
        if (from && to && from > to) {
            showToast('“From” date must be on or before “To” date.', 'error');
            return;
        }
        downloadExport({ resource: 'payments', ...params });
    });

    init();
    </script>
</body>
</html>
